# Test / secondary Postgres on host port 5444 (container still listens on 5432).
# Run: docker compose -f test-docker-compose.yml up -d
# DATABASE_URL example: postgresql://test:test@127.0.0.1:5444/test
#
# Project name is NOT the default "docker" — avoids replacing litecoin-ordinals-dev-postgres.

name: litecoin-ordinals-test

services:
  postgres:
    image: postgres:14
    ports:
      - "5444:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../../database/postgres_test_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
