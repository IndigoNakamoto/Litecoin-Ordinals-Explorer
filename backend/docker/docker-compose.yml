# version: '3'

# services:
#   postgres:
#     image: postgres:14
#     ports:
#       - "5432:5432"
#     volumes:
#       - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
#       - ../../database/postgres_data:/var/lib/postgresql/data
#     environment:
#       - POSTGRES_USER=ord_lite_user
#       - POSTGRES_PASSWORD=ord_lite_pass
#       - POSTGRES_DB=ord_lite_db
#       - POSTGRES_SHARED_BUFFERS=1GB  # Adjust the value as needed
#     command:
#       - "postgres"
#       - "-c"
#       - "shared_buffers=${POSTGRES_SHARED_BUFFERS}"  # Pass shared_buffers value as a command line argument

# Default: Postgres only.
#   Regtest (local dev):  docker compose --profile litecoin up -d
#   Mainnet (real sync): docker compose --profile litecoin-mainnet up -d --build
#
# Host port for Postgres defaults to 15432 so another project's :5432 does not conflict.
# Override in backend/docker/.env: EXPLORER_POSTGRES_PORT=5432
#
# See README.md in this directory and backend/docker/btcpay/README.md for BTCPay.
#
# Explicit project name so this stack does not collide with test-docker-compose.yml
# (same folder would otherwise default to project "docker" for both).
name: litecoin-ordinals-dev

services:
  postgres:
    image: postgres:14
    ports:
      - "${EXPLORER_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../../database/postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=ord_lite_user
      - POSTGRES_PASSWORD=ord_lite_pass
      - POSTGRES_DB=ord_lite_db
      # Set custom environment variable for shared_buffers
      - POSTGRES_SHARED_BUFFERS=65536  # Adjust the value as needed
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128000"
      - "-c"
      - "work_mem=256000"

  # Litecoin Core regtest + ord-litecoin HTTP API (profile: litecoin)
  litecoind:
    profiles: ["litecoin"]
    # Hub tag is single-arch linux/amd64 only; set platform so Apple Silicon doesn't warn and emulates explicitly.
    platform: linux/amd64
    image: litecoinproject/litecoin-core:latest
    # Image entrypoint always appends -datadir="$LITECOIN_DATA" LAST (overrides inline -datadir).
    environment:
      LITECOIN_DATA: /data
    volumes:
      - litecoin_regtest:/data
    ports:
      - "19443:19443"
      - "19444:19444"
    command:
      - litecoind
      - -printtoconsole
      - -regtest=1
      - -txindex=1
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcport=19443
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=litecoin
      - -rpcpassword=litecoin
    healthcheck:
      test:
        [
          "CMD",
          "litecoin-cli",
          "-datadir=/data",
          "-regtest",
          "-rpcconnect=127.0.0.1",
          "-rpcport=19443",
          "-rpcuser=litecoin",
          "-rpcpassword=litecoin",
          "getblockcount",
        ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s

  ord-litecoin:
    profiles: ["litecoin"]
    # Build from upstream https://github.com/ynohtna92/ord-litecoin (no third-party Hub image).
    # Pin with ORD_LITECOIN_GIT_REF in backend/docker/.env (default: tag 0.20.1-litecoin).
    # First start runs a Rust release build (CPU + time); later starts reuse the image.
    build:
      context: https://github.com/ynohtna92/ord-litecoin.git#${ORD_LITECOIN_GIT_REF:-0.20.1-litecoin}
      dockerfile: Dockerfile
    image: litecoin-ordinals-dev-ord-litecoin:${ORD_LITECOIN_GIT_REF:-0.20.1-litecoin}
    depends_on:
      litecoind:
        condition: service_healthy
    volumes:
      - ord_litecoin_data:/data
    ports:
      - "8080:80"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      ORD_LITECOIN_RPC_USERNAME: litecoin
      ORD_LITECOIN_RPC_PASSWORD: litecoin
    command:
      - /usr/local/bin/ord
      - --regtest
      - --litecoin-rpc-url=http://litecoind:19443
      - --data-dir=/data
      - server
      - --http-port=80

  # --- Mainnet: full Litecoin chain sync + ord (separate volumes and ports from regtest) ---
  litecoind-mainnet:
    profiles: ["litecoin-mainnet"]
    platform: linux/amd64
    image: litecoinproject/litecoin-core:latest
    environment:
      LITECOIN_DATA: /data
    volumes:
      - litecoin_mainnet:/data
    ports:
      - "${LITECOIN_MAINNET_RPC_PORT:-9332}:9332"
      - "${LITECOIN_MAINNET_P2P_PORT:-9333}:9333"
    command:
      - litecoind
      - -printtoconsole
      - -txindex=1
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcport=9332
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=litecoin
      - -rpcpassword=litecoin
    healthcheck:
      test:
        [
          "CMD",
          "litecoin-cli",
          "-datadir=/data",
          "-rpcconnect=127.0.0.1",
          "-rpcport=9332",
          "-rpcuser=litecoin",
          "-rpcpassword=litecoin",
          "getblockcount",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  ord-litecoin-mainnet:
    profiles: ["litecoin-mainnet"]
    build:
      context: https://github.com/ynohtna92/ord-litecoin.git#${ORD_LITECOIN_GIT_REF:-0.20.1-litecoin}
      dockerfile: Dockerfile
    image: litecoin-ordinals-dev-ord-litecoin:${ORD_LITECOIN_GIT_REF:-0.20.1-litecoin}
    depends_on:
      litecoind-mainnet:
        condition: service_healthy
    volumes:
      - ord_litecoin_mainnet_data:/data
    ports:
      - "${LITECOIN_MAINNET_ORD_HTTP_PORT:-8081}:80"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    command:
      - /usr/local/bin/ord
      - --chain=mainnet
      - --litecoin-rpc-url=http://litecoind-mainnet:9332
      - --litecoin-rpc-username=litecoin
      - --litecoin-rpc-password=litecoin
      - --data-dir=/data
      - server
      - --http-port=80

volumes:
  litecoin_regtest:
  ord_litecoin_data:
  litecoin_mainnet:
  ord_litecoin_mainnet_data: